name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: vetfamily-494417
  REGION: europe-north1
  REPOSITORY: storefront
  SERVICE: storefront
  IMAGE: europe-north1-docker.pkg.dev/vetfamily-494417/storefront/storefront

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SALEOR_API_URL="${{ secrets.NEXT_PUBLIC_SALEOR_API_URL }}" \
            --build-arg NEXT_PUBLIC_DEFAULT_CHANNEL="${{ vars.NEXT_PUBLIC_DEFAULT_CHANNEL }}" \
            --build-arg NEXT_PUBLIC_STOREFRONT_URL="${{ vars.NEXT_PUBLIC_STOREFRONT_URL }}" \
            --tag "${{ env.IMAGE }}:${{ github.sha }}" \
            --tag "${{ env.IMAGE }}:latest" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ env.IMAGE }}:${{ github.sha }}"
          docker push "${{ env.IMAGE }}:latest"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: --allow-unauthenticated --port 3000

      - name: Print service URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
