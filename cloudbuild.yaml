steps:
  # Build the container image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=NEXT_PUBLIC_SALEOR_API_URL=${_NEXT_PUBLIC_SALEOR_API_URL}
      - --build-arg=NEXT_PUBLIC_DEFAULT_CHANNEL=${_NEXT_PUBLIC_DEFAULT_CHANNEL}
      - --build-arg=NEXT_PUBLIC_STOREFRONT_URL=${_NEXT_PUBLIC_STOREFRONT_URL}
      - -t=gcr.io/$PROJECT_ID/petvamily-storefront:$BUILD_ID
      - -t=gcr.io/$PROJECT_ID/petvamily-storefront:latest
      - .

  # Push both tags
  - name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, gcr.io/$PROJECT_ID/petvamily-storefront]

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - vetfamily-storefront
      - --image=gcr.io/$PROJECT_ID/petvamily-storefront:$BUILD_ID
      - --region=europe-north1
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-env-vars=NODE_ENV=production

substitutions:
  _NEXT_PUBLIC_SALEOR_API_URL: https://your-instance.saleor.cloud/graphql/
  _NEXT_PUBLIC_DEFAULT_CHANNEL: default-channel
  _NEXT_PUBLIC_STOREFRONT_URL: https://vetfamily-storefront-289757075353.europe-north1.run.app

images:
  - gcr.io/$PROJECT_ID/petvamily-storefront:$BUILD_ID
  - gcr.io/$PROJECT_ID/petvamily-storefront:latest

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
